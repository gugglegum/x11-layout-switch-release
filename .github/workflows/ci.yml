name: CI

on:
  push:
  pull_request:

jobs:
  shell-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n bin/x11-layout-switch-release.sh
