# x11-layout-switch-release configuration
#
# This file is sourced by the listener on startup, including when it is started
# from ~/.config/autostart/x11-layout-switch-release.desktop.
#
# Leave values commented out if automatic detection works for you.
# Uncomment and edit only the settings you need.

# Explicit keyboard id for xinput test.
# Example:
# KB_LAYOUT_SWITCH_KEYBOARD_ID=8

# Preferred keyboard device name for automatic detection.
# KB_LAYOUT_SWITCH_KEYBOARD_NAME='AT Translated Set 2 keyboard'

# Fallback keyboard device name if the preferred one is not found.
# KB_LAYOUT_SWITCH_FALLBACK_KEYBOARD_NAME='Virtual core keyboard'

# Path or command name for xkb-switch if it is not available as plain
# "xkb-switch" in PATH.
# XKB_SWITCH_CMD='xkb-switch'

# Set to 1 to print debug output to stderr.
# KB_LAYOUT_SWITCH_DEBUG=0
